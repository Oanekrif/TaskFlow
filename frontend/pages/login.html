<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css?v=1.0.1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="layer_group_icon.png">
    <title>Login & Register | Authentication</title>

</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-body p-4 p-md-5">

                        <!-- Pills navs -->
                        <ul class="nav nav-pills nav-justified mb-4" id="authTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="pill"
                                    data-bs-target="#login-pane" type="button" role="tab" aria-controls="login-pane"
                                    aria-selected="true">
                                    <i class="fas fa-sign-in-alt me-2"></i>Login
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="pill"
                                    data-bs-target="#register-pane" type="button" role="tab"
                                    aria-controls="register-pane" aria-selected="false">
                                    <i class="fas fa-user-plus me-2"></i>Register
                                </button>
                            </li>
                        </ul>

                        <!-- Pills content -->
                        <div class="tab-content" id="authTabContent">

                            <!-- Login Form -->
                            <div class="tab-pane fade show active" id="login-pane" role="tabpanel"
                                aria-labelledby="login-tab">
                                <form id="loginForm">
                                    <!-- <div class="text-center mb-3">
                                        <p class="text-muted">Sign in with:</p>
                                        <div class="d-flex justify-content-center gap-2">
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-facebook-f"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-google"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-twitter"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-github"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="text-center mb-3">
                                        <span class="text-muted">or:</span>
                                    </div>  -->

                                    <!-- Email input -->
                                    <div class="mb-4">
                                        <label class="form-label" for="loginEmail">Email or Username</label>
                                        <input type="email" id="loginEmail" class="form-control"
                                            placeholder="Enter your email or username">
                                    </div>

                                    <!-- Password input -->
                                    <div class="mb-4">
                                        <label class="form-label" for="loginPassword">Password</label>
                                        <div class="input-group">
                                            <input type="password" id="loginPassword" class="form-control"
                                                placeholder="Enter your password">
                                            <button class="btn btn-outline-secondary" type="button"
                                                onclick="togglePassword('loginPassword', this)">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <!-- Options -->
                                    <div class="row mb-4">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <label class="form-check-label" for="rememberCheck">
                                                    <input class="form-check-input" type="checkbox" id="rememberCheck"
                                                    checked>
                                                    Remember me
                                                </label>
                                            </div>
                                        </div>
                                        <div class="col-md-6 text-end">
                                            <a href="#!" class="small">Forgot password?</a>
                                        </div>
                                    </div>

                                    <!-- Submit button -->
                                    <button type="submit" class="btn btn-primary w-100 mb-4">
                                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                    </button>

                                    <!-- Register link -->
                                    <div class="text-center">
                                        <p class="mb-0">Not a member? <a href="#" class="register-link">Register now</a>
                                        </p>
                                    </div>
                                </form>
                                <div class="demo-message" id="demoInfoLogin">
                                    💡 Connect to the real backend
                                </div>
                            </div>

                            <!-- Register Form -->
                            <div class="tab-pane fade" id="register-pane" role="tabpanel"
                                aria-labelledby="register-tab">
                                <form id="registerForm">
                                    <!-- <div class="text-center mb-3">
                                        <p class="text-muted">Sign up with:</p>
                                        <div class="d-flex justify-content-center gap-2">
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-facebook-f"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-google"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-twitter"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-floating mx-1">
                                                <i class="fab fa-github"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="text-center mb-3">
                                        <span class="text-muted">or:</span>
                                    </div> -->

                                    <!-- Name input -->
                                    <div class="mb-3">
                                        <label class="form-label" for="registerName">Full Name</label>
                                        <input type="text" id="registerName" class="form-control"
                                            placeholder="Enter your full name">
                                    </div>

                                    <!-- Username input -->
                                    <div class="mb-3">
                                        <label class="form-label" for="registerUsername">Username</label>
                                        <input type="text" id="registerUsername" class="form-control"
                                            placeholder="Choose a username">
                                    </div>

                                    <!-- Email input -->
                                    <div class="mb-3">
                                        <label class="form-label" for="registerEmail">Email Address</label>
                                        <input type="email" id="registerEmail" class="form-control"
                                            placeholder="Enter your email">
                                    </div>

                                    <!-- Password input -->
                                    <div class="mb-3">
                                        <label class="form-label" for="registerPassword">Password</label>
                                        <div class="input-group">
                                            <input type="password" id="registerPassword" class="form-control"
                                                placeholder="Create a password">
                                            <button class="btn btn-outline-secondary" type="button"
                                                onclick="togglePassword('registerPassword', this)">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <small class="text-muted">Password must be at least 8 characters</small>
                                    </div>

                                    <!-- Repeat Password input -->
                                    <div class="mb-3">
                                        <label class="form-label" for="registerRepeatPassword">Confirm Password</label>
                                        <div class="input-group">
                                            <input type="password" id="registerRepeatPassword" class="form-control"
                                                placeholder="Confirm your password">
                                            <button class="btn btn-outline-secondary" type="button"
                                                onclick="togglePassword('registerRepeatPassword', this)">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <!-- Terms Checkbox -->
                                    <div class="form-check mb-4">
                                        <input class="form-check-input" type="checkbox" id="termsCheck" checked>
                                        <label class="form-check-label" for="termsCheck">
                                            I have read and agree to the <a href="#!">Terms of Service</a>
                                        </label>
                                    </div>

                                    <!-- Submit button -->
                                    <button type="submit" class="btn btn-primary w-100 mb-3">
                                        <i class="fas fa-user-plus me-2"></i>Sign Up
                                    </button>

                                    <!-- Login link -->
                                    <div class="text-center">
                                        <p class="mb-0">Already have an account? <a href="#" class="login-link">Sign
                                                in</a></p>
                                    </div>
                                </form>
                                <div class="demo-message" id="demoInfoRegister">
                                    💡 Connect to the real backend
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.service.js?v=1.0.1"></script>
    <script src="login.js?v=1.0.1"></script>
</body>

</html>
